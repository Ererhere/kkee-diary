<meta name="theme-color" content="#f9f0eb">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #fdf8f5;
    --card: #fff;
    --primary: #d4896a;
    --primary-light: #f5e6df;
    --text: #3a2e2a;
    --text-light: #9a8580;
    --erere: #7dc49a;
    --keke: #8faec4;
    --border: #ede5e0;
    --shadow: 0 2px 16px rgba(100,60,40,0.08);
  }

  body {
    font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* 顶部导航 */
  .nav {
    position: sticky;
    top: 0;
    background: rgba(253,248,245,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .nav-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.5px;
  }

  .nav-sub {
    font-size: 11px;
    color: var(--text-light);
    text-align: center;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  .back-btn {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 24px;
    color: var(--primary);
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }

  /* 主页 */
  #page-home .greeting {
    text-align: center;
    padding: 40px 24px 24px;
  }

  .greeting .date-label {
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .greeting .title-main {
    font-size: 26px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.4;
  }

  .greeting .subtitle {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 6px;
  }

  .user-cards {
    padding: 8px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .user-card {
    border-radius: 20px;
    padding: 32px 24px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .user-card:active { transform: scale(0.97); }

  .user-card.erere {
    background: linear-gradient(135deg, #e4f5ea 0%, #d0e9d8 100%);
    border: 1px solid #c2deca;
  }

  .user-card.keke {
    background: linear-gradient(135deg, #e4eef5 0%, #d0dfe9 100%);
    border: 1px solid #c2d4e0;
  }

  .card-deco {
    position: absolute;
    right: -10px;
    top: -10px;
    font-size: 80px;
    opacity: 0.12;
    transform: rotate(15deg);
  }

  .card-name {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .user-card.erere .card-name { color: #4a9b6a; }
  .user-card.keke .card-name { color: #4a7a9b; }

  .card-desc {
    font-size: 13px;
    opacity: 0.7;
    color: var(--text);
  }

  .card-count {
    margin-top: 16px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .user-card.erere .card-count { color: #4a9b6a; }
  .user-card.keke .card-count { color: #4a7a9b; }

  /* 日记列表页 */
  .page-header {
    padding: 20px 20px 0;
  }

  .write-btn {
    position: fixed;
    bottom: 32px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(212,137,106,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
    z-index: 50;
    line-height: 1;
  }

  .write-btn:active { transform: scale(0.92); }

  .diary-list {
    padding: 16px 20px 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .diary-item {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 20px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
    border: 1px solid var(--border);
  }

  .diary-item:active { transform: scale(0.98); }

  .diary-item-date {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .diary-item-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .diary-item-preview {
    font-size: 13px;
    color: var(--text-light);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.6;
  }

  .diary-item-footer {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .comment-badge {
    font-size: 11px;
    color: var(--text-light);
  }

  .mood-tag {
    font-size: 18px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-light);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* 日记详情页 */
  .diary-detail {
    padding: 20px 20px 100px;
  }

  .detail-date {
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .detail-mood { font-size: 28px; margin-bottom: 16px; }

  .detail-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .detail-content {
    font-size: 15px;
    color: var(--text);
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .detail-divider {
    margin: 28px 0;
    border: none;
    border-top: 1px solid var(--border);
  }

  /* 留言区 */
  .comments-section h3 {
    font-size: 14px;
    color: var(--text-light);
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .comment-item {
    background: var(--primary-light);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }

  .comment-author {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .comment-author.erere { color: #c0584a; }
  .comment-author.keke { color: #4a7a9b; }

  .comment-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .comment-time {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 6px;
  }

  .comment-input-area {
    margin-top: 20px;
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .who-select {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .who-btn {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 2px solid transparent;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--bg);
    transition: all 0.15s;
  }

  .who-btn.erere.active { border-color: #e8a598; background: #fce8e4; color: #c0584a; }
  .who-btn.keke.active { border-color: #8faec4; background: #e4eef5; color: #4a7a9b; }

  textarea {
    width: 100%;
    border: 1px solid var(--border);

  .save-btn {

  /* 通用 */

  .loading {

  .loading .spinner {

  @keyframes spin { to { transform: rotate(360deg); } }

  .action-btn.edit { background: var(--primary-light); color: var(--primary); }
  .action-btn.delete { background: #fde8e8; color: #c0504a; }
</style>

<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 主页 -->

  <div class="nav">

    <div class="nav-title">写日记</div>
    <button onclick="location.reload(true)" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:20px;cursor:pointer;color:var(--primary);padding:4px 8px;line-height:1;">↻</button>
  </div>
  <div class="write-form">
    <div class="who-write-select">
      <button class="who-write-btn erere active" id="write-as-erere" onclick="setWriteAs('erere')">而而写</button>

      <label class="form-label">标题（可选）</label>
      <input type="text" class="form-input" id="write-title" placeholder="今天想说的一句话…">
    </div>

    <div class="form-group">
      <label class="form-label">日记内容</label>
      <textarea id="write-content" style="min-height:200px" placeholder="今天发生了什么，想记下来…"></textarea>
    </div>
  </div>
  <button class="save-btn" id="save-btn" onclick="saveDiary()">保存日记</button>

<script>
const TOKEN = ['github_pat_11CFXZ54I0lCz','88ikCky6P_yIGPBKPiZif2wWlmQRcJVm3UboatTQS6H88MCbj0RP4C6WZQ74Hsu9mBpDV'].join('');
const OWNER = 'ererhere';
const REPO = 'CLAUDE.md';
const BRANCH = 'main';
const DIARY_PATH = 'diary/data';

const MOODS = ['🌸','☀️','🌙','🌧️','🌈','💕','🌿','⭐','🍵','🥺'];

let currentUser = 'erere';
let currentDiary = null;
let writeAs = 'erere';

// 初始化
function init() {
  const today = new Date();
  document.getElementById('home-date').textContent = formatDate(today, 'long');
  document.getElementById('write-date').value = formatDate(today, 'input');
  initMoodPicker();
  loadCounts();
}

function formatDate(date, mode) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  if (mode === 'input') return `${y}-${m}-${d}`;
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  if (mode === 'long') return `${y}年${m}月${d}日 ${weekdays[date.getDay()]}`;
  return `${y}.${m}.${d}`;
}

function formatTime(isoStr) {
  const d = new Date(isoStr);
  return `${formatDate(d,'short')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatFileName(name) {
  const parts = name.split('_');
  const datePart = parts[0].replace(/-/g,'.');
  if (parts[1]) {
    return `${datePart} ${parts[1].slice(0,2)}:${parts[1].slice(2,4)}`;
  }
  return datePart;
}

function initMoodPicker() {
  const picker = document.getElementById('mood-picker');
  MOODS.forEach(mood => {
    const el = document.createElement('span');
    el.className = 'mood-option';
    el.textContent = mood;
    el.onclick = () => {
      document.querySelectorAll('.mood-option').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
    };
    picker.appendChild(el);
  });
  picker.querySelector('.mood-option').classList.add('selected');
}

// GitHub API
async function githubGet(path) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`;
  const res = await fetch(url, { headers: { Authorization: `token ${TOKEN}` } });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function githubPut(path, content, message, sha) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
  const body = {
    message,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: BRANCH,
  };
  if (sha) body.sha = sha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      Authorization: `token ${TOKEN}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}


async function githubDeleteFile(path, sha) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
  const res = await fetch(url, {
    method: 'DELETE',
    headers: { Authorization: `token ${TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `delete: ${path}`, sha, branch: BRANCH }),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function listDiaries(user) {
  const data = await githubGet(`${DIARY_PATH}/${user}`);
  if (!data || !Array.isArray(data)) return [];
  return data.filter(f => f.name.endsWith('.json')).map(f => f.name.replace('.json',''));
}

async function loadDiary(user, date) {
  const data = await githubGet(`${DIARY_PATH}/${user}/${date}.json`);
  if (!data) return null;
  const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
  return { ...JSON.parse(content), sha: data.sha };
}

async function saveDiaryData(user, date, diaryObj, sha) {
  const content = JSON.stringify(diaryObj, null, 2);
  await githubPut(
    `${DIARY_PATH}/${user}/${date}.json`,
    content,
    `diary: ${user} ${date}`,
    sha
  );
}

// 加载日记数量
async function loadCounts() {
  try {
    const [eDates, kDates] = await Promise.all([listDiaries('erere'), listDiaries('keke')]);
    document.getElementById('erere-count').innerHTML = `<span>📖</span><span>${eDates.length} 篇日记</span>`;
    document.getElementById('keke-count').innerHTML = `<span>📖</span><span>${kDates.length} 篇日记</span>`;
  } catch(e) {
    document.getElementById('erere-count').innerHTML = `<span>📖</span><span>暂无日记</span>`;
    document.getElementById('keke-count').innerHTML = `<span>📖</span><span>暂无日记</span>`;
  }
}

// 打开日记列表
async function openDiaryList(user) {
  currentUser = user;
  const names = { erere: '而而', keke: '钶钶' };
  document.getElementById('list-title').textContent = `${names[user]}的日记本`;
  showPage('page-list');

  const content = document.getElementById('diary-list-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><br>加载中…</div>';

  try {
    const dates = await listDiaries(user);
    dates.sort((a,b) => b.localeCompare(a));

    if (dates.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <p>还没有日记<br>点击右下角开始写第一篇吧</p>
        </div>`;
      return;
    }

    const diaries = await Promise.all(dates.map(d => loadDiary(user, d)));

    let html = '<div class="diary-list">';
    diaries.forEach((diary, i) => {
      if (!diary) return;
      const preview = diary.content ? diary.content.replace(/\n/g,' ').slice(0,80) : '';
      const commentCount = (diary.comments || []).length;
      html += `
        <div class="diary-item" onclick="openDetail('${dates[i]}')">
          <div class="diary-item-date">${formatFileName(dates[i])}</div>
          ${diary.mood ? `<div class="mood-tag">${diary.mood}</div>` : ''}
          <div class="diary-item-title">${diary.title || '无题'}</div>
          <div class="diary-item-preview">${preview || '（无内容）'}</div>
          <div class="diary-item-footer">
            ${commentCount > 0 ? `<span class="comment-badge">💬 ${commentCount} 条留言</span>` : ''}
          </div>
        </div>`;
    });
    html += '</div>';
    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">😓</div><p>加载失败，请检查网络</p></div>`;
  }
}

// 打开日记详情
async function openDetail(date) {
  showPage('page-detail');
  const names = { erere: '而而', keke: '钶钶' };
  document.getElementById('detail-nav-title').textContent = names[currentUser];

  const content = document.getElementById('diary-detail-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><br>加载中…</div>';

  try {
    const diary = await loadDiary(currentUser, date);
    currentDiary = { ...diary, date: diary.date, fileName: date, user: currentUser };

    const comments = diary.comments || [];
    const commentHtml = comments.map(c => `
      <div class="comment-item">
        <div class="comment-author ${c.author}">${c.author === 'erere' ? '而而' : '钶钶'}</div>
        <div class="comment-text">${c.content}</div>
        <div class="comment-time">${formatTime(c.time)}</div>
      </div>`).join('');

    content.innerHTML = `
      <div class="diary-detail">
        <div class="detail-date">${formatFileName(date)}</div>
        ${diary.mood ? `<div class="detail-mood">${diary.mood}</div>` : ''}
        <div class="detail-title">${diary.title || '无题'}</div>
        <div class="detail-content">${diary.content || ''}</div>
        <hr class="detail-divider">
        <div class="detail-actions">
          <button class="action-btn edit" onclick="editDiary()">编辑</button>
          <button class="action-btn delete" onclick="deleteDiary()">删除</button>
        </div>
      <div class="comments-section">
          <h3>留言 ${comments.length > 0 ? `(${comments.length})` : ''}</h3>
          ${commentHtml || '<p style="color:var(--text-light);font-size:13px">还没有留言，来说点什么吧</p>'}
          <div class="comment-input-area">
            <div class="who-select">
              <button class="who-btn erere active" onclick="setCommentAs('erere')">而而留言</button>
              <button class="who-btn keke" onclick="setCommentAs('keke')">钶钶留言</button>
            </div>
            <textarea id="comment-text" placeholder="写点什么…" rows="3"></textarea>
            <button class="submit-btn" onclick="submitComment()">发送留言</button>
          </div>
        </div>
      </div>`;
  } catch(e) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">😓</div><p>加载失败</p></div>`;
  }
}

let commentAs = 'erere';
let editingFileName = null;

function editDiary() {
  editingFileName = currentDiary.fileName;
  showPage('page-write');
  document.getElementById('write-date').value = currentDiary.date;
  document.getElementById('write-title').value = currentDiary.title || '';
  document.getElementById('write-content').value = currentDiary.content || '';
  setWriteAs(currentDiary.user);
  const moodInput = document.getElementById('mood-input');
  if (moodInput) moodInput.value = currentDiary.mood || '';
  document.querySelector('.who-write-btn.' + currentDiary.user).click();
}

async function deleteDiary() {
  if (!confirm('确定要删除这篇日记吗？')) return;
  try {
    await githubDeleteFile(`${DIARY_PATH}/${currentDiary.user}/${currentDiary.fileName}.json`, currentDiary.sha);
    showToast('删除成功 ♡');
    setTimeout(() => goList(), 800);
  } catch(e) {
    showToast('删除失败，请重试');
  }
}
function setCommentAs(who) {
  commentAs = who;
  document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.who-btn.${who}`).classList.add('active');
}

async function submitComment() {
  const text = document.getElementById('comment-text').value.trim();
  if (!text) { showToast('请先写点什么 (^ ^)'); return; }

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '发送中…';

  try {
    const diary = await loadDiary(currentDiary.user, currentDiary.fileName);
    const comments = diary.comments || [];
    comments.push({ author: commentAs, content: text, time: new Date().toISOString() });
    diary.comments = comments;
    await saveDiaryData(currentDiary.user, currentDiary.fileName, diary, diary.sha);
    showToast('留言发送成功 ♡');
    await openDetail(currentDiary.date);
  } catch(e) {
    showToast('发送失败，请重试');
    btn.disabled = false;
    btn.textContent = '发送留言';
  }
}

// 写日记
function openWrite() {
  showPage('page-write');
  document.getElementById('write-date').value = formatDate(new Date(), 'input');
  document.getElementById('write-title').value = '';
  document.getElementById('write-content').value = '';
  const mi = document.getElementById('mood-input'); if(mi) mi.value = '';
  setWriteAs(currentUser);
}

function setWriteAs(who) {
  writeAs = who;
  document.querySelectorAll('.who-write-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.who-write-btn.${who}`).classList.add('active');
}

async function saveDiary() {
  const date = document.getElementById('write-date').value;
  const title = document.getElementById('write-title').value.trim();
  const content = document.getElementById('write-content').value.trim();
  const mood = document.getElementById('mood-input')?.value.trim() || '';

  if (!date) { showToast('请选择日期'); return; }
  if (!content) { showToast('日记内容不能为空哦'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '保存中…';

  try {
    let fileName, fileSha, existingComments;
    if (editingFileName) {
      fileName = editingFileName;
      const existing = await loadDiary(writeAs, fileName);
      fileSha = existing?.sha;
      existingComments = existing?.comments || [];
      editingFileName = null;
    } else {
      const now = new Date();
      const hhmm = String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0');
      fileName = `${date}_${hhmm}`;
      fileSha = undefined;
      existingComments = [];
    }

    const diaryObj = { date, author: writeAs, mood, title: title || '无题', content, comments: existingComments };
    await saveDiaryData(writeAs, fileName, diaryObj, fileSha);
    showToast('日记保存成功 ♡');
    currentUser = writeAs;
    setTimeout(() => openDiaryList(writeAs), 800);
  } catch(e) {
    showToast('保存失败，请重试');
    btn.disabled = false;
    btn.textContent = '保存日记';
  }
}

// 页面切换
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() { showPage('page-home'); loadCounts(); }
function goList() { openDiaryList(currentUser); }

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
